version: 2
updates:
  # Go modules
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps"
    labels:
      - dependencies
    open-pull-requests-limit: 10

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"
    labels:
      - dependencies
      - ci

  # npm (VS Code extension)
  - package-ecosystem: npm
    directory: /vscode-mdl
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps"
    labels:
      - dependencies
